name: Admin Bypass Audit

# helmet-pipeline: v1.21.1
#
# Detects commits on main that bypassed the required-status-checks gate — i.e.,
# direct pushes with no associated PR — and opens a GitHub Issue labeled
# `admin-bypass` (plus a workflow warning annotation).
#
# With enforce_admins: false (solo-dev default), repo admins can bypass branch
# protection via direct push or --admin merge. This workflow makes those
# bypasses visible and auditable after the fact.
#
# Design: a single push-time `audit` job. It keys on github.actor — the
# UNFORGEABLE identity of whoever pushed, evaluated AT push time. A human direct
# push with no PR is flagged; pushes by automation (github-actions, dependabot,
# etc.) are skipped. This is robust because github.actor cannot be spoofed, and
# it never false-positives on a repo's own automation: pinact's GITHUB_TOKEN
# pushes don't trigger workflows at all, so the audit simply never runs for them.
#
# AUTHORITATIVE TRAIL: for ORG-OWNED repos, the canonical tamper-proof record of
# branch-protection bypasses is GitHub's ORGANIZATION AUDIT LOG, not this workflow.
# Every override is recorded server-side as a `protected_branch.policy_override`
# event (real actor, token, before/after SHAs), immune to CI-skip markers and
# unforgeable because it sits OUTSIDE the repo at GitHub's API boundary. Query it
# (audit-log API needs GitHub Enterprise Cloud; otherwise use the org audit-log
# UI / export):
#   gh api '/orgs/<ORG>/audit-log?phrase=action:protected_branch.policy_override'
# (User-owned repos have no org audit log and no equivalent server-side bypass
# record, so for them this push-time workflow is the primary signal.) Either way
# this workflow is a CONVENIENCE
# layer — a low-latency GitHub Issue at push time so routine direct-push bypasses
# are visible without polling the audit log.
#
# Known limitations (accepted):
# - `gh pr merge --admin` associates the merge commit with a PR, so this workflow
#   won't flag admin-merges. Those are the pr-grind opt-in's own authorized path
#   and are logged separately to .claude/bypass-log.jsonl.
# - A direct push carrying a native CI-skip marker ([skip ci], [skip actions],
#   skip-checks:true, …) in its commit message suppresses this workflow, so the
#   convenience Issue won't be opened for that push. For ORG-OWNED repos this is
#   not an audit gap — the org audit log above still records the bypass server-side,
#   immune to CI-skip markers. USER-OWNED repos have no equivalent audit-log
#   fallback, so a CI-skip direct push there is an accepted residual gap. A post-hoc
#   workflow "sweep" to close the gap was
#   evaluated and REJECTED — a workflow cannot distinguish legitimate automation
#   from a forged bypass after the fact (author identity is spoofable; CI-skip
#   markers are push-level, so a paired unmarked commit evades a per-commit check;
#   and GITHUB_TOKEN automation pushes create no workflow run, indistinguishable
#   from a suppressed one). That structural limitation is exactly why GitHub's
#   server-side audit log, not a workflow, is the real answer.
# - No dedup on purpose. A title/SHA existing-issue check is both pre-creatable
#   (anyone with issues:write — incl. a bypasser who knows their own SHA — can
#   pre-open or edit a matching issue to suppress the audit; issue metadata is
#   MUTABLE, so even an author filter is insider-editable) and short-SHA-collision
#   -prone. A manual workflow re-run is rare and a duplicate issue is harmless —
#   far better than a suppression/collision vector.
#
# SECURITY: All user-controlled inputs (commit message, actor name) are passed
# via env: block and quoted in shell. Never interpolate github.event.* directly
# into run: commands.

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: bypass-audit-${{ github.sha }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  # Push-time audit: immediate detection of a direct push to main with no PR.
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read       # required by /commits/{sha}/pulls on PRIVATE repos (public repos work without it)
      issues: write        # create audit issues
      pull-requests: read  # look up PR for commit SHA
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Detect direct-push bypass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          HEAD_SHA: ${{ github.sha }}
          COMMITS_JSON: ${{ toJSON(github.event.commits) }}
        run: |
          # GitHub runs `shell: bash` steps with `-eo pipefail` (see defaults above),
          # so a pipe whose reader closes early (e.g. `head`) would SIGPIPE its
          # still-writing upstream and fail the step. Every pipe below is pipefail-
          # safe: readers consume their full input, and first-line extraction uses
          # bash parameter expansion rather than `head`. `set -e` here is belt-and-
          # braces (the wrapper already sets it).
          set -e

          # Skip automated actors ONLY (bots run via GITHUB_TOKEN, semantic-release,
          # dependabot, etc.). IDENTITY-based skip — the pusher is the same for every
          # commit in the push — NOT a message-content skip: a human direct-pusher
          # cannot suppress the audit via commit text. Commit messages are likewise
          # never consulted to skip (`chore(release)`/`[skip ci]` are attacker-
          # forgeable); legitimate release commits are authored by a bot actor and
          # are already skipped here.
          if [[ "$ACTOR" == *"[bot]"* ]] || [[ "$ACTOR" == "github-actions" ]]; then
            echo "Skipping audit — automated actor: $ACTOR"
            exit 0
          fi

          # Audit every commit added by this push, not just HEAD. A multi-commit
          # direct push whose HEAD happens to be PR-associated (e.g. a re-pushed
          # already-merged commit) would otherwise hide earlier unaudited commits.
          # Source: github.event.commits (the push payload's commit list, capped by
          # GitHub at 2048). Fall back to HEAD_SHA if the payload carries no list.
          mapfile -t ALL_SHAS < <(printf '%s' "$COMMITS_JSON" | jq -r '.[].id // empty' 2>/dev/null)
          if [ "${#ALL_SHAS[@]}" -eq 0 ]; then
            ALL_SHAS=("$HEAD_SHA")
          fi
          # Bound the per-run PR-lookup work: each commit costs ONE cheap read call
          # (bypasses are summarized into a SINGLE issue below, so there is no
          # per-commit issue-creation rate-limit pressure). If the push exceeds
          # MAX_AUDIT, audit the first MAX_AUDIT AND fail the run (durable red-X) so
          # the unaudited remainder is never silently passed — investigate it
          # manually. MAX_AUDIT is well above any realistic push so a legitimate
          # large merge does not trip it.
          AUDIT_FAILED=0
          MAX_AUDIT=256
          SHAS=("${ALL_SHAS[@]:0:$MAX_AUDIT}")
          if [ "${#ALL_SHAS[@]}" -gt "$MAX_AUDIT" ]; then
            echo "::error::Push has ${#ALL_SHAS[@]} commits (> $MAX_AUDIT) — audited the first $MAX_AUDIT and failing the run; review the remainder manually."
            AUDIT_FAILED=1
          fi
          echo "Auditing ${#SHAS[@]} of ${#ALL_SHAS[@]} commit(s) added by this push."

          # Collect bypassing commits into ONE summary issue (filed after the loop)
          # rather than an issue per commit: a multi-commit bypass would otherwise
          # fire N issue-create calls and hit GitHub's content-creation secondary
          # rate limit, and one issue is easier to triage. AUDIT_FAILED (set above)
          # also accumulates per-commit indeterminate lookups so a single bad commit
          # fails the whole run WITHOUT skipping the rest.
          BYPASS_ROWS=""
          BYPASS_COUNT=0
          for COMMIT_SHA in "${SHAS[@]}"; do
            # Look up PRs associated with this commit SHA.
            # CRITICAL: Distinguish "API succeeded, no PR found" (= bypass) from
            # "API failed/garbled" (= INDETERMINATE → flag the run, keep auditing).
            # Capture stderr SEPARATELY (not 2>&1) — a successful call that emits a
            # warning on stderr would otherwise corrupt PRS_JSON and manufacture a
            # false indeterminate.
            PRS_ERR=$(mktemp)
            if ! PRS_JSON=$(gh api "repos/$REPO/commits/$COMMIT_SHA/pulls" 2>"$PRS_ERR"); then
              echo "::error::gh api failed to list PRs for $COMMIT_SHA — bypass status indeterminate; failing the run."
              echo "Response: $(head -c 500 "$PRS_ERR" | tr -d '\r')"
              rm -f "$PRS_ERR"
              AUDIT_FAILED=1
              continue
            fi
            rm -f "$PRS_ERR"

            # A 200-OK-but-unexpected body (not a JSON array) is INDETERMINATE, not
            # "zero PRs" — `jq -e` errors on a non-array, so flag rather than
            # silently misclassify.
            if ! PR_COUNT=$(printf '%s' "$PRS_JSON" | jq -e 'if type=="array" then length else error("not an array") end' 2>/dev/null); then
              echo "::error::Unexpected PR-list response for $COMMIT_SHA — indeterminate; failing the run."
              AUDIT_FAILED=1
              continue
            fi
            if [ "$PR_COUNT" != "0" ]; then
              PR_NUM=$(printf '%s' "$PRS_JSON" | jq -r '.[0].number // "?"' 2>/dev/null || echo "?")
              echo "No bypass — $COMMIT_SHA came from PR #$PR_NUM"
              continue
            fi

            # No associated PR → direct push = bypass. Accumulate a table row;
            # file ONE summary issue after the loop.
            echo "::warning::Admin bypass: direct push to main by $ACTOR (commit ${COMMIT_SHA})"
            SHORT_SHA=$(printf '%s' "$COMMIT_SHA" | cut -c1-7)
            # First line of the commit message (attacker-controlled). Sanitize for a
            # Markdown TABLE CELL: strip backtick (octal 140) / CR / LF / pipe,
            # truncate, then wrap in inline code so no Markdown (links/emphasis/HTML)
            # parses inside the cell.
            MSG=$(printf '%s' "$COMMITS_JSON" | jq -r --arg s "$COMMIT_SHA" '(.[] | select(.id==$s) | .message) // ""' 2>/dev/null || echo "")
            FIRST_LINE=${MSG%%$'\n'*}
            SUBJECT=$(printf '%s' "$FIRST_LINE" | tr -d '\140\r\n|' | cut -c1-100)
            BYPASS_ROWS="${BYPASS_ROWS}| [\`${SHORT_SHA}\`](https://github.com/${REPO}/commit/${COMMIT_SHA}) | \`${SUBJECT}\` |"$'\n'
            BYPASS_COUNT=$((BYPASS_COUNT + 1))
          done

          # File ONE summary issue if any bypass was detected.
          if [ "$BYPASS_COUNT" -gt 0 ]; then
            # Ensure the admin-bypass label exists (idempotent). `gh label create`
            # exits non-zero when it ALREADY exists; treat "created" OR "already
            # present" as OK, only a genuine absence sets LABEL_OK=0.
            LABEL_OK=1
            gh label create "admin-bypass" \
              --color "d93f0b" \
              --description "Commit bypassed required status checks" \
              --repo "$REPO" 2>/dev/null \
              || gh api "repos/$REPO/labels/admin-bypass" --jq '.name' 2>/dev/null | grep -qx "admin-bypass" \
              || LABEL_OK=0

            NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            TITLE="Admin Bypass: ${BYPASS_COUNT} direct-push commit(s) by @$ACTOR"
            BODY_FILE=$(mktemp)
            {
              printf '%s\n\n' "**Direct Push Bypass Detected**"
              printf 'The following %s commit(s) were pushed directly to `main` by @%s without an associated pull request, bypassing required status checks and review policy.\n\n' "$BYPASS_COUNT" "$ACTOR"
              printf '| Commit | Subject |\n'
              printf '|--------|---------|\n'
              printf '%s' "$BYPASS_ROWS"
              printf '\n'
              printf '| Field | Value |\n'
              printf '|-------|-------|\n'
              printf '| **Pushed by** | @%s |\n' "$ACTOR"
              printf '| **Workflow run** | [%s](https://github.com/%s/actions/runs/%s) |\n' "$RUN_ID" "$REPO" "$RUN_ID"
              printf '| **Time (UTC)** | `%s` |\n\n' "$NOW"
              printf '**Action required:** Review whether these pushes were intentional. If so, document the rationale and close. If not, investigate how branch protection was circumvented.\n'
            } > "$BODY_FILE"

            # Try with label first; fall back to no-label. If even the unlabeled
            # create fails, flag the run so the bypass is not silently unrecorded.
            if [ "$LABEL_OK" = "1" ]; then
              if ! gh issue create --repo "$REPO" --title "$TITLE" --body-file "$BODY_FILE" --label "admin-bypass" 2>&1; then
                echo "::warning::Failed to create labeled issue — retrying without label"
                gh issue create --repo "$REPO" --title "$TITLE" --body-file "$BODY_FILE" \
                  || { echo "::error::Failed to create the admin-bypass summary issue"; AUDIT_FAILED=1; }
              fi
            else
              echo "::warning::admin-bypass label unavailable — creating issue without label"
              gh issue create --repo "$REPO" --title "$TITLE" --body-file "$BODY_FILE" \
                || { echo "::error::Failed to create the admin-bypass summary issue"; AUDIT_FAILED=1; }
            fi
            rm -f "$BODY_FILE"
          fi

          if [ "$AUDIT_FAILED" = "1" ]; then
            echo "::error::One or more pushed commits could not be audited or filed — failing the run."
            exit 1
          fi
