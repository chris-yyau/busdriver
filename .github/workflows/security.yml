# CI backstop for security checks that seatbelt runs at commit time.
# Defense-in-depth: catches issues from commits that bypass local hooks.
name: Security

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - '.github/**'
      - 'hooks/**'
      - 'scripts/**'
      - '**/*.sh'
      - '**/*.js'
      - '**/*.mjs'
      - '**/*.py'
      - '**/*.yml'
      - '**/*.yaml'
      - '.seatbelt.yml'
      - 'package.json'
      - '**/package-lock.json'
      - '**/pnpm-lock.yaml'
      - '**/yarn.lock'
      - '**/go.sum'
      - '**/requirements*.txt'
      - '**/Dockerfile'
      - '**/*.tf'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    outputs:
      security: ${{ steps.filter.outputs.security }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect security-relevant changes
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -eo pipefail
          if [ "$EVENT_NAME" = "push" ]; then
            echo "security=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Fail-closed: if base SHA is unavailable, treat as security-relevant (run scanners)
          # rather than silently skipping. Errors here mean we can't determine the diff.
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::warning::Base SHA $BASE_SHA not available locally — running scanners (fail-closed)"
            echo "security=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Capture diff OUTSIDE the if-condition. Bash suspends `set -e` for commands
          # used as `if` test conditions (per `man bash`), so `if git diff ... | grep` would
          # let `git diff` failures fall through to the else branch (fail-OPEN, silent
          # scanner skip). Capturing into a variable with `||` lets us force fail-closed.
          # Pattern is a superset of on: push: paths: globs above — PR scanning is intentionally
          # broader (pyproject.toml, uv.lock, Cargo.lock, Package.resolved added) for safety.
          changed_files="$(git diff --name-only "$BASE_SHA"...HEAD)" || {
            echo "::warning::git diff failed — running scanners (fail-closed)"
            echo "security=true" >> "$GITHUB_OUTPUT"
            exit 0
          }
          # Defense-in-depth: any change under .github/ (workflows, scripts, this
          # detector itself) is always security-relevant, independent of the
          # pattern below — so a future edit that accidentally narrows the pattern
          # can't stop a workflow-touching PR from being scanned. (^|/) anchors to
          # a real path segment so e.g. src/my.github/x.js does not match.
          # Capture exit status explicitly rather than testing the grep
          # directly in the `if` — bash suspends `set -e` for commands used
          # as `if` test conditions, so a grep exit-2 (I/O/regex error) would
          # otherwise be silently treated as "false" and fall through to the
          # broader pattern below, defeating this block's independence from
          # that pattern (the exact anti-pattern fixed at lines 100-107,
          # flagged by Devin Review on this block).
          github_grep_status=0
          grep -qE '(^|/)\.github/' <<< "$changed_files" || github_grep_status=$?
          case "$github_grep_status" in
            0) echo "security=true" >> "$GITHUB_OUTPUT"; exit 0 ;;
            1) ;; # no .github/ changes — continue to broader pattern check
            *) echo "::warning::grep (.github check) failed (exit $github_grep_status) — running scanners (fail-closed)"
               echo "security=true" >> "$GITHUB_OUTPUT"; exit 0 ;;
          esac
          # Capture grep's exit status explicitly. Bash suspends `set -e` for commands
          # used as `if` test conditions (per `man bash`) — same class of bug as the
          # git diff case above. A grep exit-2 (regex error, I/O fault) would otherwise
          # be treated as "false" → security=false → silent scanner skip (fail-OPEN).
          # Flagged by Greptile as residual after the prior git-diff fix.
          grep_status=0
          grep -qE '\.(sh|js|mjs|py|yml|yaml|tf)$|\.github/|hooks/|scripts/|\.seatbelt\.yml|package\.json|package-lock\.json|pnpm-lock\.yaml|yarn\.lock|go\.sum|requirements.*\.txt|Dockerfile|pyproject\.toml|uv\.lock|Cargo\.lock|Package\.resolved' <<< "$changed_files" || grep_status=$?
          case "$grep_status" in
            0) echo "security=true" >> "$GITHUB_OUTPUT" ;;
            1) echo "security=false" >> "$GITHUB_OUTPUT" ;;
            *) echo "::warning::grep failed (exit $grep_status) — running scanners (fail-closed)"
               echo "security=true" >> "$GITHUB_OUTPUT" ;;
          esac

  gitleaks:
    name: Secret scanning
    # Unconditional within this workflow — deliberately NOT gated by the
    # `changes` path filter (unlike the other scanners below). Secrets can land
    # in ANY file type, so a path-allowlist skip is fail-open on PRs: a secret in
    # a non-allowlisted file (*.pem, *.env, config.json, …) would skip the scan,
    # and a skipped required check counts as passing — letting the secret merge
    # unscanned. So gitleaks runs on every PR (the merge gate that #209 is about).
    # NOTE: direct pushes to main remain subject to the workflow-level
    # `on.push.paths` filter above, so a push touching only non-allowlisted files
    # won't schedule the workflow at all — PRs (the actual merge gate) are always
    # covered; direct-push coverage would require broadening `on.push.paths`.
    # gitleaks is fast (~12s). See #209.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.30.1"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan for secrets
        run: gitleaks detect --source . --verbose --exit-code 1

  shellcheck-ci:
    name: Shell script quality
    needs: [changes]
    if: always() && (needs.changes.outputs.security == 'true' || needs.changes.result != 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint shell scripts
        run: find hooks/gate-scripts scripts .github/scripts -name '*.sh' -print0 | xargs -0 shellcheck

  trivy:
    name: Dependency CVEs
    needs: [changes]
    if: always() && (needs.changes.outputs.security == 'true' || needs.changes.result != 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Scan dependencies
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: 1
          skip-dirs: tests

  semgrep:
    name: Code security
    needs: [changes]
    if: always() && (needs.changes.outputs.security == 'true' || needs.changes.result != 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install semgrep
        run: pip install --quiet 'semgrep==1.169.0'  # Pin version — unpinned is a supply chain risk
      - name: Scan for vulnerabilities
        run: semgrep scan --config p/security-audit --error --exclude tests --exclude 'scripts/**' --exclude 'skills/*/scripts/**' .

  checkov:
    name: IaC misconfig
    needs: [changes]
    if: always() && (needs.changes.outputs.security == 'true' || needs.changes.result != 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install checkov
        run: pip install --quiet 'checkov==3.3.8'  # Pin version — unpinned is a supply chain risk
      - name: Scan for misconfigurations
        run: checkov -d . --skip-path tests --quiet --compact

  zizmor:
    name: Actions security
    needs: [changes]
    if: always() && (needs.changes.outputs.security == 'true' || needs.changes.result != 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify SHA pinning
        run: bash .github/scripts/check-pinned-uses.sh
      - name: Install zizmor
        run: pip install --quiet 'zizmor==1.26.1'  # Pin version — unpinned is a supply chain risk
      - name: Scan GitHub Actions workflows
        run: zizmor .github/workflows/

  reports:
    if: always()
    needs: [changes, gitleaks, shellcheck-ci, trivy, semgrep, checkov, zizmor]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Write summary
        env:
          GITLEAKS: ${{ needs.gitleaks.result }}
          SHELLCHECK_CI: ${{ needs.shellcheck-ci.result }}
          TRIVY: ${{ needs.trivy.result }}
          SEMGREP: ${{ needs.semgrep.result }}
          CHECKOV: ${{ needs.checkov.result }}
          ZIZMOR: ${{ needs.zizmor.result }}
        run: |
          {
            echo "## Security Backstop"
            echo "| Scanner | Result |"
            echo "|---------|--------|"
            echo "| gitleaks | $GITLEAKS |"
            echo "| shellcheck | $SHELLCHECK_CI |"
            echo "| trivy | $TRIVY |"
            echo "| semgrep | $SEMGREP |"
            echo "| checkov | $CHECKOV |"
            echo "| zizmor | $ZIZMOR |"
          } >> "$GITHUB_STEP_SUMMARY"
