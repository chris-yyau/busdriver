# CI backstop for security checks that seatbelt runs at commit time.
# Defense-in-depth: catches issues from commits that bypass local hooks.
name: Security

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - '.github/**'
      - 'hooks/**'
      - 'scripts/**'
      - '**/*.sh'
      - '**/*.js'
      - '**/*.mjs'
      - '**/*.py'
      - '**/*.yml'
      - '**/*.yaml'
      - '.seatbelt.yml'
      - 'package.json'
      - '**/package-lock.json'
      - '**/pnpm-lock.yaml'
      - '**/yarn.lock'
      - '**/go.sum'
      - '**/requirements*.txt'
      - '**/Dockerfile'
      - '**/*.tf'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    outputs:
      security: ${{ steps.filter.outputs.security }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect security-relevant changes
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -eo pipefail
          if [ "$EVENT_NAME" = "push" ]; then
            echo "security=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Fail-closed: if base SHA is unavailable, treat as security-relevant (run scanners)
          # rather than silently skipping. Errors here mean we can't determine the diff.
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::warning::Base SHA $BASE_SHA not available locally — running scanners (fail-closed)"
            echo "security=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Capture diff OUTSIDE the if-condition. Bash suspends `set -e` for commands
          # used as `if` test conditions (per `man bash`), so `if git diff ... | grep` would
          # let `git diff` failures fall through to the else branch (fail-OPEN, silent
          # scanner skip). Capturing into a variable with `||` lets us force fail-closed.
          # Pattern is a superset of on: push: paths: globs above — PR scanning is intentionally
          # broader (pyproject.toml, uv.lock, Cargo.lock, Package.resolved added) for safety.
          changed_files="$(git diff --name-only "$BASE_SHA"...HEAD)" || {
            echo "::warning::git diff failed — running scanners (fail-closed)"
            echo "security=true" >> "$GITHUB_OUTPUT"
            exit 0
          }
          # Capture grep's exit status explicitly. Bash suspends `set -e` for commands
          # used as `if` test conditions (per `man bash`) — same class of bug as the
          # git diff case above. A grep exit-2 (regex error, I/O fault) would otherwise
          # be treated as "false" → security=false → silent scanner skip (fail-OPEN).
          # Flagged by Greptile as residual after the prior git-diff fix.
          grep_status=0
          grep -qE '\.(sh|js|mjs|py|yml|yaml|tf)$|\.github/|hooks/|scripts/|\.seatbelt\.yml|package\.json|package-lock\.json|pnpm-lock\.yaml|yarn\.lock|go\.sum|requirements.*\.txt|Dockerfile|pyproject\.toml|uv\.lock|Cargo\.lock|Package\.resolved' <<< "$changed_files" || grep_status=$?
          case "$grep_status" in
            0) echo "security=true" >> "$GITHUB_OUTPUT" ;;
            1) echo "security=false" >> "$GITHUB_OUTPUT" ;;
            *) echo "::warning::grep failed (exit $grep_status) — running scanners (fail-closed)"
               echo "security=true" >> "$GITHUB_OUTPUT" ;;
          esac

  gitleaks:
    name: Secret scanning
    needs: [changes]
    if: always() && (needs.changes.outputs.security == 'true' || needs.changes.result != 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.30.1"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan for secrets
        run: gitleaks detect --source . --verbose --exit-code 1

  shellcheck-ci:
    name: Shell script quality
    needs: [changes]
    if: always() && (needs.changes.outputs.security == 'true' || needs.changes.result != 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Lint shell scripts
        run: find hooks/gate-scripts scripts .github/scripts -name '*.sh' -print0 | xargs -0 shellcheck

  trivy:
    name: Dependency CVEs
    needs: [changes]
    if: always() && (needs.changes.outputs.security == 'true' || needs.changes.result != 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Check for compliance job
        id: check
        run: |
          if grep -ql 'trivy-action\|scanners.*vuln' .github/workflows/tests.yml 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Trivy already covered by compliance job — skipping"
          fi
      - name: Install trivy
        if: steps.check.outputs.skip != 'true'
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin
          trivy --version
      - name: Scan dependencies
        if: steps.check.outputs.skip != 'true'
        run: trivy fs --scanners vuln --severity HIGH,CRITICAL --exit-code 1 --skip-dirs tests .

  semgrep:
    name: Code security
    needs: [changes]
    if: always() && (needs.changes.outputs.security == 'true' || needs.changes.result != 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install semgrep
        run: pip install --quiet semgrep
      - name: Scan for vulnerabilities
        run: semgrep scan --config p/security-audit --error --exclude tests --exclude 'scripts/**' --exclude 'skills/*/scripts/**' .

  checkov:
    name: IaC misconfig
    needs: [changes]
    if: always() && (needs.changes.outputs.security == 'true' || needs.changes.result != 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install checkov
        run: pip install --quiet checkov
      - name: Scan for misconfigurations
        run: checkov -d . --skip-path tests --quiet --compact

  zizmor:
    name: Actions security
    needs: [changes]
    if: always() && (needs.changes.outputs.security == 'true' || needs.changes.result != 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Verify SHA pinning
        run: bash .github/scripts/check-pinned-uses.sh
      - name: Install zizmor
        run: pip install --quiet zizmor
      - name: Scan GitHub Actions workflows
        run: zizmor .github/workflows/

  reports:
    if: always()
    needs: [changes, gitleaks, shellcheck-ci, trivy, semgrep, checkov, zizmor]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Write summary
        env:
          GITLEAKS: ${{ needs.gitleaks.result }}
          SHELLCHECK_CI: ${{ needs.shellcheck-ci.result }}
          TRIVY: ${{ needs.trivy.result }}
          SEMGREP: ${{ needs.semgrep.result }}
          CHECKOV: ${{ needs.checkov.result }}
          ZIZMOR: ${{ needs.zizmor.result }}
        run: |
          {
            echo "## Security Backstop"
            echo "| Scanner | Result |"
            echo "|---------|--------|"
            echo "| gitleaks | $GITLEAKS |"
            echo "| shellcheck | $SHELLCHECK_CI |"
            echo "| trivy | $TRIVY |"
            echo "| semgrep | $SEMGREP |"
            echo "| checkov | $CHECKOV |"
            echo "| zizmor | $ZIZMOR |"
          } >> "$GITHUB_STEP_SUMMARY"
