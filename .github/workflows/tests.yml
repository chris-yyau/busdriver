name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint gate scripts
        run: shellcheck --severity=warning hooks/gate-scripts/*.sh
      - name: Lint shared gate helper
        # scripts/relevant-check-status.sh is the canonical lock-aware check
        # filter sourced by the pre-merge gate + pr-grind (issue #154); lint it
        # as a required check (not via the soft scripts/hooks pass below).
        run: shellcheck --severity=warning scripts/relevant-check-status.sh
      - name: Lint CI shell-test runner
        # scripts/ci/run-shell-tests.sh is the full-glob gate-test runner the
        # shell-tests job executes — lint it as a required check so it can't drift.
        run: shellcheck --severity=warning scripts/ci/run-shell-tests.sh
      - name: Lint design-clear helper
        # scripts/design-clear.sh releases a fail-CLOSED review requirement
        # (ADR 0017 / #405) — required, not soft.
        run: |
          shellcheck --severity=warning \
            scripts/design-clear.sh \
            tests/test-design-clear.sh
      - name: Lint hook scripts (shell only)
        run: |
          find scripts/hooks -name '*.sh' -print0 | xargs -0 shellcheck --severity=warning || true
      - name: Lint blueprint-review ultimate-arbiter surface
        # Required (not soft) — the opt-in gate is a security boundary. SC1091
        # (sourced libs not followed) is info-level, so --severity=warning ignores
        # it without needing -x/source-path. The gateway scripts/tests that used to
        # be listed here were deleted with the gateway rung (ADR 0019).
        run: |
          shellcheck --severity=warning \
            scripts/lib/ultimate-config.sh \
            tests/test-ultimate-config.sh \
            tests/test-ultimate-tier.sh \
            tests/test-blueprint-arbiter-default-pin.sh \
            tests/test-blueprint-review-oracle-arbiter-contract.sh \
            tests/test-vault-references.sh \
            tests/test-upstream-manifest.sh

  compliance:
    if: github.event_name == 'push'
    needs: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Trivy license scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: license
          severity: CRITICAL
          exit-code: 1
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

  version-drift:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Check version sync
        run: ./scripts/bump-version.sh --check

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - run: npm ci --ignore-scripts
      - env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npx --no-install commitlint --from "$BASE_SHA" --to "$HEAD_SHA"

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - run: npm ci --ignore-scripts
      - name: Validate agent/skill/command/hook/rule schemas + workflow + unicode safety
        run: npm run validate

  coverage:
    needs: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # --- JavaScript (vitest -> coverage/lcov.info) ---
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npx vitest run --coverage
      # --- Python (pytest-cov, federated per-suite XML) ---
      # No `cache: pip` — there is no requirements.txt in the repo, and setup-python's
      # pip cache errors out ("No file matched **/requirements.txt") when none exists.
      # Only three small wheels are installed, so caching would save nothing anyway.
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install pyyaml==6.0.3 pytest==9.0.3 pytest-cov==7.1.0
      - name: Coverage — skill-comply
        run: |
          cd skills/skill-comply
          pytest -q --cov=scripts --cov-report=xml:"$GITHUB_WORKSPACE/coverage-skill-comply.xml"
      - name: Coverage — continuous-learning-v2
        run: |
          pytest -q skills/continuous-learning-v2/scripts/test_parse_instinct.py \
            --cov=skills/continuous-learning-v2/scripts \
            --cov-report=xml:coverage-clv2.xml
      - name: Coverage — agent-self-evaluation
        run: |
          pytest -q skills/agent-self-evaluation/scripts/test_evaluate.py \
            --cov=skills/agent-self-evaluation/scripts \
            --cov-report=xml:coverage-agent-self-evaluation.xml
      # Token is passed only to this step (never job-level env, so checked-out
      # PR code in earlier steps cannot read it). continue-on-error is scoped to
      # the two cases that legitimately lack the secret: fork PRs and Dependabot
      # PRs (both run without repo secrets on a public repo, so the upload can't
      # authenticate). On same-repo pushes/PRs a real upload failure still surfaces
      # (the job is advisory, so it won't block merge, but it stays visible).
      - name: Upload to Codecov
        continue-on-error: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) || github.actor == 'dependabot[bot]' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info,./coverage-skill-comply.xml,./coverage-clv2.xml,./coverage-agent-self-evaluation.xml

  shell-tests:
    # Full tests/test-*.sh gate/security suite (#265, then broadened to full-glob in
    # the pipeline-audit-fixes plan). Before this job the shell gate-tests were never
    # executed in CI — only vitest/pytest ran; then a hand-picked ~15-test list ran,
    # leaving most gate suites uncovered. scripts/ci/run-shell-tests.sh now runs EVERY
    # discovered suite (local and CI identical), so a gate regression can't slip past
    # by never being wired in. It has NO `paths` filter, so on `pull_request` (which
    # carries no paths-ignore) it runs for ANY change. A doc-only push to main is
    # skipped by the workflow-level push `paths-ignore`, but such changes land via PR,
    # where this runs. (GitHub Actions path filters are event-level, not job-level, and
    # paths + paths-ignore cannot coexist on one event — hence relying on the unfiltered
    # pull_request trigger rather than a job-scoped `paths:` list.)
    needs: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Full shell gate-test suite
        # jq + python3 + git are preinstalled on ubuntu-latest. The runner distinguishes
        # PASS/SKIP/FAIL, enforces that the gate suites never SKIP (skip-masking guard),
        # and fails the job on any non-zero test or timeout. The suite is hermetic — it
        # does not depend on codex/agy/droid/grok being installed (see
        # docs/ci/shell-test-inventory.md). Per-test timeout is portable via
        # scripts/lib/resolve-cli.sh's _portable_timeout.
        run: bash scripts/ci/run-shell-tests.sh
